<h1>Accounts</h1>

<p>Count: {{ accounts().length }}</p>

<mat-card *ngFor="let account of accounts()" (click)="openAccount(account)" class="account-card">

    <mat-card-title>
        Account #{{account.id}}
    </mat-card-title>

    <mat-card-content>
        <p>
            <strong>Balance:</strong>
            {{ account.balance | currency: account.currency: '' }}
            {{account.currency}}
        </p>
    </mat-card-content>

</mat-card>
